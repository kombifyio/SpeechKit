[general]
language = "de"                    # Default transcription language
dictate_hotkey = "win+alt"         # Dictation hotkey (push-to-talk, speech-to-text only)
assist_hotkey = "ctrl+win"         # Assist hotkey (one-shot utility mode). Blank disables the mode.
voice_agent_hotkey = "ctrl+shift"  # Voice Agent hotkey (realtime dialogue mode). Blank disables the mode.
dictate_hotkey_behavior = "push_to_talk"
assist_hotkey_behavior = "push_to_talk"
voice_agent_hotkey_behavior = "push_to_talk"
dictate_enabled = true
assist_enabled = true
voice_agent_enabled = true
active_mode = "none"               # none, dictate, assist, voice_agent
agent_hotkey = "ctrl+win"          # Deprecated compatibility alias. SpeechKit now persists assist_hotkey + voice_agent_hotkey separately.
agent_mode = "assist"              # Deprecated compatibility alias for legacy agent_hotkey readers.
hotkey = "win+alt"                 # Legacy alias for dictate_hotkey
hotkey_mode = "push_to_talk"
auto_stop_silence_ms = 500
fast_mode_silence_ms = 1500
model_download_dir = ""            # Blank = %LOCALAPPDATA%/SpeechKit/models. Set a dedicated folder for local model downloads.

[ui]
overlay_enabled = true    # Show the top-center overlay
overlay_position = "top"  # top, bottom, left, right
overlay_movable = false   # When true, the pill can be dragged away from its anchored side
overlay_free_x = 0        # Center point in screen coordinates when overlay_movable = true
overlay_free_y = 0        # Center point in screen coordinates when overlay_movable = true
# overlay_monitor_positions stores per-monitor movable overlay positions automatically.
# Example:
# [ui.overlay_monitor_positions."0,0,2560,1440"]
# x = 1280
# y = 180
visualizer = "pill"       # pill or circle
design = "default"        # default or kombify

[local]
enabled = false
model = "ggml-small.bin"
model_path = ""           # Auto: ./models/ first, then %LOCALAPPDATA%/SpeechKit/models/
port = 8080               # whisper-server port
gpu = "auto"              # auto, cuda, vulkan, cpu

[local_llm]
enabled = false
base_url = "http://127.0.0.1:8082/v1" # SpeechKit-managed OpenAI-compatible local LLM runtime endpoint
model = "gemma4:e4b"
model_path = ""                      # Downloaded GGUF model path; blank = managed model directory
port = 8082
gpu = "auto"                         # auto, cuda, vulkan, cpu
utility_model = "gemma4:e4b"
assist_model = "gemma4:e4b"
agent_model = "gemma4:e4b"

[vps]
enabled = false
url = ""                  # Example: https://voice.your-vps.tld
api_key_env = "VPS_API_KEY"  # Environment variable or Doppler secret name

[huggingface]
enabled = false           # Legacy STT toggle for HF routed inference; dedicated HF Endpoints are modeled separately in the profile catalog
model = "openai/whisper-large-v3" # Routed/shared provider model, not a dedicated endpoint deployment
token_env = "HF_TOKEN"    # Fallback env var when no stored host token exists; Doppler is internal/dev only
# utility_model = "Qwen/Qwen3.5-9B"
# assist_model = "Qwen/Qwen3.5-27B"
# agent_model = "Qwen/Qwen3.5-27B" # Voice Agent pipeline fallback / legacy agent flow

[routing]
strategy = "dynamic"      # dynamic, local-only, cloud-only
prefer_local_under_seconds = 10
parallel_cloud = false    # Start cloud parallel to local
replace_on_better = false # Silently replace with better result

[feedback]
save_audio = true         # Legacy compat only; [store] is the preferred config surface
audio_retention_days = 7  # Mirrored from [store] while legacy readers still exist
db_path = ""              # Auto: %APPDATA%/SpeechKit/feedback.db
max_audio_storage_mb = 500

[store]
backend = "sqlite"        # Local mode default
sqlite_path = ""          # Auto: %APPDATA%/SpeechKit/feedback.db (audio files live in sibling audio/)
postgres_dsn = ""         # Required when backend = "postgres"
save_audio = true         # Persist raw WAV files locally
audio_retention_days = 7  # 0 disables automatic deletion
max_audio_storage_mb = 500

[vocabulary]
dictionary = ""           # One entry per line. Use "spoken => canonical" for corrections, or a single term as a recognition hint.

# ──────────────────────────────────────────────
# Mode Model Selection — same per-mode provider settings exposed by /api/v1/modes/{mode}/settings
# Every mode supports the four V23 provider groups: local built-in, local provider, cloud provider, direct provider.
# Use GET /api/v1/providers/profiles and GET /api/v1/providers/readiness for host-managed setup flows.
# ──────────────────────────────────────────────

[model_selection.dictate]
primary_profile_id = "stt.local.whispercpp"    # Default local built-in primary. Alternatives: stt.ollama.gemma4-e4b-transcribe, stt.routed.whisper-large-v3, stt.openai.whisper-1
fallback_profile_id = ""

[model_selection.assist]
primary_profile_id = "assist.builtin.gemma4-e4b"    # Default local built-in Assist LLM. Alternatives: assist.ollama.gemma4-e4b, assist.openai.gpt-5.4
fallback_profile_id = ""

[model_selection.voice_agent]
primary_profile_id = "realtime.google.gemini-native-audio" # Default realtime Voice Agent. Alternatives: realtime.ollama.gemma4-e4b-pipeline, realtime.hf.qwen35-27b
fallback_profile_id = ""

# ──────────────────────────────────────────────
# Shortcuts — additive command aliases per locale
# Extends the built-in OSS lexicon without patching Go code.
# Use quoted locale keys for region-specific overrides like "de-at" or "en-us".
# ──────────────────────────────────────────────

# [shortcuts.locale.de]
# leading_fillers = ["bitte", "hey speechkit"]
# summarize = ["kurzfassung", "briefing"]
# copy_last = ["kopier den letzten block"]
# insert_last = ["setz das ein"]
# quick_note = ["merkzettel"]

# [shortcuts.locale.en]
# leading_fillers = ["please", "hey speechkit"]
# summarize = ["brief me", "tl dr"]

# ──────────────────────────────────────────────
# TTS — Text-to-Speech (Assist Mode)
# Assist can return text plus optional audio. The host decides whether to play the result aloud.
# ──────────────────────────────────────────────

[tts]
enabled = true
strategy = "cloud-first"      # cloud-first, local-first, cloud-only, local-only
speed = 1.0                   # 0.25 - 4.0
format = "mp3"                # mp3, wav, opus, pcm

[tts.openai]
enabled = true
model = "tts-1"               # tts-1 or tts-1-hd
voice = "nova"                # alloy, echo, fable, onyx, nova, shimmer

[tts.google]
enabled = false
voice = "de-DE-Neural2-B"     # Google Cloud TTS voice name

[tts.huggingface]
enabled = false
model = "parler-tts/parler-tts-mini-multilingual-v1.1"  # Multilingual TTS via HF Inference API

[tts.local]
enabled = false
model = "hexgrad/Kokoro-82M"
model_path = ""
port = 8081

# ──────────────────────────────────────────────
# Voice Agent — realtime live session
# Gemini Live is the canonical Voice Agent runtime. The Voice Agent contract is realtime-first and separate from Assist.
# ──────────────────────────────────────────────

[voice_agent]
enabled = true
model = "gemini-2.5-flash-native-audio-preview-12-2025" # Recommended Voice Agent default
fallback_model = "gpt-realtime-mini"       # Fallback if primary unavailable
voice = "Kore"                             # Voice for real-time model
framework_prompt = ""                      # Durable host/framework prompt. Empty = SpeechKit default Voice Agent framework behavior.
refinement_prompt = ""                     # Optional personal refinement prompt layered on top of the framework prompt.
instruction = ""                           # Legacy alias for framework_prompt. Keep empty for new configs.
reminder_after_idle_sec = 300              # Remind user after 5 min silence
deactivate_after_idle_sec = 900            # Auto-deactivate after 15 min silence
pipeline_fallback = false                  # Uses STT -> Agent LLM -> optional TTS for non-realtime Voice Agent profiles.
show_prompter = true                       # Show live transcript window during voice agent
enable_session_summary = true              # Generate a structured dialogue summary when a session ends
enable_input_transcript = true             # Server-side transcript of the user's speech
enable_output_transcript = true            # Server-side transcript of the model's speech
enable_affective_dialog = false            # Uses Gemini Live v1alpha; not supported on Gemini 3.1 Flash Live
thinking_enabled = false                   # Enable Gemini thinking for harder tasks
include_thoughts = false                   # Include thought traces when the model supports them
thinking_budget = 0                        # Optional token budget for thinking
thinking_level = "medium"                  # off, low, medium, high
context_compression_enabled = true         # Keep long sessions healthy with server-side compression
context_compression_trigger_tokens = 12000
context_compression_target_tokens = 6000
automatic_activity_detection = true        # Gemini Live server-side VAD / turn detection
activity_handling = "start_of_activity_interrupts" # start_of_activity_interrupts, no_interrupt
turn_coverage = "turn_includes_only_activity"      # turn_includes_only_activity, turn_includes_all_input, turn_includes_audio_activity
vad_start_sensitivity = "low"              # low or high
vad_end_sensitivity = "low"                # low or high
vad_prefix_padding_ms = 100
vad_silence_duration_ms = 700

# ──────────────────────────────────────────────
# Provider Configuration
# STT, LLM, TTS, and Realtime model assignments per provider.
# API keys are resolved from environment variables or Doppler.
# ──────────────────────────────────────────────

