# ──────────────────────────────────────────────
# TTS — Text-to-Speech (Assist Mode)
# Framework always returns Text + Audio. UI decides what to show.
# ──────────────────────────────────────────────

[tts]
enabled = true
strategy = "cloud-first"      # cloud-first, local-first, cloud-only, local-only
speed = 1.0                   # 0.25 - 4.0
format = "mp3"                # mp3, wav, opus, pcm

[tts.openai]
enabled = true
model = "tts-1"               # tts-1 or tts-1-hd
voice = "nova"                # alloy, echo, fable, onyx, nova, shimmer

[tts.google]
enabled = false
voice = "de-DE-Neural2-B"     # Google Cloud TTS voice name

[tts.huggingface]
enabled = false
model = "parler-tts/parler-tts-mini-multilingual-v1.1"  # Multilingual TTS via HF Inference API

[tts.local]
enabled = false
model = "hexgrad/Kokoro-82M"
model_path = ""
port = 8081

# ──────────────────────────────────────────────
# Voice Agent — Real-Time Audio-to-Audio
# Uses native models (Gemini Live, OpenAI Realtime) — no STT/TTS pipeline.
# ──────────────────────────────────────────────

[voice_agent]
enabled = true
model = "gemini-2.5-flash-native-audio-preview-12-2025" # Recommended Voice Agent default
fallback_model = "gpt-realtime-mini"       # Fallback if primary unavailable
voice = "Kore"                             # Voice for real-time model
instruction = ""                           # Optional host instruction / prompt guide. Empty = SpeechKit default general-help instruction.
reminder_after_idle_sec = 300              # Remind user after 5 min silence
deactivate_after_idle_sec = 900            # Auto-deactivate after 15 min silence
pipeline_fallback = true                   # Use STT+LLM+TTS as last resort
show_prompter = true                       # Show live transcript window during voice agent
enable_input_transcript = true             # Server-side transcript of the user's speech
enable_output_transcript = true            # Server-side transcript of the model's speech
enable_affective_dialog = false            # Uses Gemini Live v1alpha; not supported on Gemini 3.1 Flash Live
thinking_enabled = false                   # Enable Gemini thinking for harder tasks
include_thoughts = false                   # Include thought traces when the model supports them
thinking_budget = 0                        # Optional token budget for thinking
thinking_level = "medium"                  # off, low, medium, high
context_compression_enabled = true         # Keep long sessions healthy with server-side compression
context_compression_trigger_tokens = 24000
context_compression_target_tokens = 12000
automatic_activity_detection = true        # Gemini Live server-side VAD / turn detection
activity_handling = "start_of_activity_interrupts" # start_of_activity_interrupts, no_interrupt
turn_coverage = "turn_includes_only_activity"      # turn_includes_only_activity, turn_includes_all_input, turn_includes_audio_activity
vad_start_sensitivity = "low"              # low or high
vad_end_sensitivity = "low"                # low or high
vad_prefix_padding_ms = 100
vad_silence_duration_ms = 700

# ──────────────────────────────────────────────
# Provider Configuration
# STT, LLM, TTS, and Realtime model assignments per provider.
# API keys are resolved from environment variables or Doppler.
# ──────────────────────────────────────────────

