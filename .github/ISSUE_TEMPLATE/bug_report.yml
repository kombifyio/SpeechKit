name: Bug report
description: Report a reproducible problem in SpeechKit
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this template for reproducible defects in the framework, desktop host, build, or docs.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Windows version, SpeechKit version or commit, and provider setup
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste only relevant excerpts and redact sensitive data
