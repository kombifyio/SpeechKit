name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  frontend-ci:
    name: Frontend Checks
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend/app

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - name: Run frontend tests
        run: npm test

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  android-ci:
    name: Android Checks
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Detect Android project
        id: android-project
        shell: bash
        run: |
          if [ -f android/gradlew ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Android Gradle wrapper found; skipping Android checks."
          fi

      - name: Setup Java
        if: steps.android-project.outputs.present == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        if: steps.android-project.outputs.present == 'true'
        working-directory: android
        run: chmod +x gradlew

      - name: Run Android unit tests
        if: steps.android-project.outputs.present == 'true'
        working-directory: android
        run: ./gradlew test

      - name: Run Android lint
        if: steps.android-project.outputs.present == 'true'
        working-directory: android
        run: ./gradlew lint

  go-analysis:
    name: Go Analysis
    runs-on: ${{ vars.WINDOWS_CI_RUNNER || 'windows-2025' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26.2'
          cache: true

      - name: Setup MinGW
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Run go vet
        shell: pwsh
        run: go vet ./...

      - name: Check gofmt
        shell: pwsh
        run: |
          $fmtOut = & gofmt -s -l (Get-ChildItem -Recurse -Filter *.go -File |
            Where-Object { $_.FullName -notmatch '\\(node_modules|frontend|Website|marketing-site-svelte|android|internal\\frontendassets|\.cache)\\' } |
            Select-Object -ExpandProperty FullName)
          if ($fmtOut) {
            Write-Host "Files not gofmt'd:"
            Write-Host $fmtOut
            exit 1
          }

      - name: Install golangci-lint
        shell: pwsh
        run: |
          $version = 'v2.11.4'
          & go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@$version"

      - name: Run golangci-lint
        shell: pwsh
        run: golangci-lint run --timeout=5m ./...

      - name: Run go race tests
        shell: pwsh
        # Covers pure-logic packages. Desktop/CGo-heavy packages are covered
        # by normal tests and the Windows bundle build.
        run: >-
          go test -race
          ./pkg/speechkit/...
          ./internal/ai/...
          ./internal/assist/...
          ./internal/config/...
          ./internal/features/...
          ./internal/models/...
          ./internal/router/...
          ./internal/secrets/...
          ./internal/shortcuts/...
          ./internal/store/...
          ./internal/stt/...
          ./internal/textactions/...
          ./internal/tray/...
          ./internal/tts/...
          ./internal/voiceagent/...

      - name: Coverage report
        shell: pwsh
        run: |
          $packages = @(
            './pkg/speechkit/...',
            './internal/ai/...',
            './internal/assist/...',
            './internal/config/...',
            './internal/features/...',
            './internal/models/...',
            './internal/router/...',
            './internal/secrets/...',
            './internal/shortcuts/...',
            './internal/store/...',
            './internal/stt/...',
            './internal/textactions/...',
            './internal/tray/...',
            './internal/tts/...',
            './internal/voiceagent/...'
          )

          & go test -coverprofile coverage.out -covermode atomic @packages
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $coverageReport = & go tool cover -func coverage.out
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $coverageReport | Select-String 'total:'
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      # Upload coverage. If CODECOV_TOKEN is not configured, the step
      # will warn but not fail CI. Pinned to SHA so supply-chain drift in
      # third-party actions requires an explicit PR (dependabot bumps this).
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: coverage.out
          flags: go
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Install Staticcheck
        shell: pwsh
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run Staticcheck
        shell: pwsh
        run: staticcheck ./...

      - name: Install govulncheck
        shell: pwsh
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        shell: pwsh
        run: govulncheck ./...

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48

  windows-ci:
    name: Windows CI
    runs-on: ${{ vars.WINDOWS_CI_RUNNER || 'windows-2025' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26.2'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Setup MinGW
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Run canonical Windows bundle build
        shell: pwsh
        run: ./scripts/build.ps1 -SkipInstaller -SkipVerification

      - name: Upload embedded frontend assets
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: speechkit-frontend-assets
          path: internal/frontendassets/dist
          retention-days: 1
