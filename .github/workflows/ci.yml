name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend Checks
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-4vcpu-ubuntu-2204' }}
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend/app

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  android-ci:
    name: Android Checks
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-4vcpu-ubuntu-2204' }}
    timeout-minutes: 30

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Run Android unit tests
        run: ./gradlew test

      - name: Run Android lint
        run: ./gradlew lint

  go-analysis:
    name: Go Analysis
    runs-on: ${{ vars.WINDOWS_CI_RUNNER || 'blacksmith-4vcpu-windows-2025' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.25.8'
          cache: true

      - name: Setup MinGW
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Run go vet
        shell: pwsh
        run: go vet ./...

      - name: Run go race tests
        shell: pwsh
        # Covers all pure-logic packages. CGo-heavy packages (audio/vad) are
        # excluded because they require physical hardware in CI.
        run: >-
          go test -race
          ./pkg/speechkit/...
          ./internal/router/...
          ./internal/voiceagent/...
          ./internal/assist/...
          ./internal/store/...
          ./internal/secrets/...
          ./internal/ai/...
          ./internal/config/...
          ./internal/stt/...
          ./internal/tts/...
          ./internal/shortcuts/...
          ./internal/features/...
          ./internal/models/...
          ./internal/textactions/...

      - name: Install Staticcheck
        shell: pwsh
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run Staticcheck
        shell: pwsh
        run: staticcheck ./...

      - name: Install govulncheck
        shell: pwsh
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        shell: pwsh
        run: govulncheck ./...

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48

  windows-ci:
    name: Windows CI
    runs-on: ${{ vars.WINDOWS_CI_RUNNER || 'blacksmith-4vcpu-windows-2025' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.25.8'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Setup MinGW
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Run canonical Windows bundle build
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build.ps1

      - name: Upload embedded frontend assets
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: speechkit-frontend-assets
          path: internal/frontendassets/dist
          retention-days: 1
