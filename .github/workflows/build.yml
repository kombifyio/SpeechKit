name: Build

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-bundle:
    name: Build Windows Bundle
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ vars.WINDOWS_BUILD_RUNNER || 'windows-2025' }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26.2'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Setup MinGW
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build canonical Windows bundle
        if: github.event_name != 'workflow_dispatch'
        shell: pwsh
        run: ./scripts/build.ps1 -SkipInstaller

      - name: Build canonical Windows bundle and installer
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Upload Windows bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        with:
          name: speechkit-windows-bundle
          path: dist/windows/SpeechKit
          retention-days: 1

      - name: Upload Windows installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        with:
          name: speechkit-windows-installer
          path: dist/windows/SpeechKit-Setup.exe
          retention-days: 1
