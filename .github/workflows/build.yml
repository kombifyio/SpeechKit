name: Build

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-bundle:
    name: Build Windows Bundle
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ vars.WINDOWS_BUILD_RUNNER != '' && vars.WINDOWS_BUILD_RUNNER || 'windows-latest' }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build canonical Windows bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build.ps1

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: speechkit-windows-bundle
          path: dist/windows/SpeechKit
          retention-days: 1

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: speechkit-windows-installer
          path: dist/windows/SpeechKit-Setup.exe
          retention-days: 1
