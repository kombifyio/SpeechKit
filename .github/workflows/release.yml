name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
      release_windows_portable:
        description: 'Attach the portable Windows bundle (.zip)'
        required: true
        default: true
        type: boolean
      release_windows_installer:
        description: 'Attach the NSIS Windows installer (.exe)'
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: write
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve Release Plan
    if: github.repository == 'kombifyio/SpeechKit'
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-24.04' }}
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      release_windows_portable: ${{ steps.plan.outputs.release_windows_portable }}
      release_windows_installer: ${{ steps.plan.outputs.release_windows_installer }}
      should_build_windows: ${{ steps.plan.outputs.should_build_windows }}

    steps:
      - name: Resolve release plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
            checkout_ref="refs/tags/$tag"
            release_windows_portable="${{ github.event.inputs.release_windows_portable }}"
            release_windows_installer="${{ github.event.inputs.release_windows_installer }}"
          else
            tag="${{ github.ref_name }}"
            checkout_ref="${{ github.ref }}"
            release_windows_portable=true
            release_windows_installer=true
          fi

          should_build_windows=false
          if [ "$release_windows_portable" = true ] || [ "$release_windows_installer" = true ]; then
            should_build_windows=true
          fi

          {
            echo "tag=$tag"
            echo "checkout_ref=$checkout_ref"
            echo "release_windows_portable=$release_windows_portable"
            echo "release_windows_installer=$release_windows_installer"
            echo "should_build_windows=$should_build_windows"
          } >> "$GITHUB_OUTPUT"

  wait-for-publisher-release:
    name: Wait For Publisher Draft
    needs: prepare
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-24.04' }}

    steps:
      - name: Wait for draft release created by the publisher app
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag }}"

          for attempt in $(seq 1 40); do
            is_draft="$(gh release view "$tag" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft' 2>/dev/null || true)"
            if [ -n "$is_draft" ]; then
              if [ "$is_draft" = "true" ]; then
                exit 0
              fi
              echo "::error title=Release already published::Expected $tag to exist as a draft release from the private publisher flow."
              exit 1
            fi
            sleep 15
          done

          echo "::error title=Missing draft release::No draft release for $tag was created by the publisher app."
          exit 1

  build-and-release:
    name: Build Windows Assets
    needs:
      - prepare
      - wait-for-publisher-release
    if: needs.prepare.outputs.should_build_windows == 'true'
    runs-on: ${{ vars.WINDOWS_BUILD_RUNNER || 'windows-2025' }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26.1'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Render release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          node ./scripts/release/render-release-notes.mjs \
            --version "${{ needs.prepare.outputs.tag }}" \
            --repo-url "https://github.com/${{ github.repository }}" \
            --output release-notes.md

      - name: Setup MinGW
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install NSIS
        if: needs.prepare.outputs.release_windows_installer == 'true'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build canonical Windows bundle
        shell: pwsh
        run: |
          if ('${{ needs.prepare.outputs.release_windows_installer }}' -eq 'true') {
            ./scripts/build.ps1
          } else {
            ./scripts/build.ps1 -SkipInstaller
          }

      - name: Ensure SignPath configuration for public Windows releases
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES != 'true'
        shell: bash
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          SIGNPATH_PUBLISHER_NAME: ${{ vars.SIGNPATH_PUBLISHER_NAME }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "$SIGNPATH_API_TOKEN" ] || missing+=("SIGNPATH_API_TOKEN secret")
          [ -n "$SIGNPATH_ORGANIZATION_ID" ] || missing+=("SIGNPATH_ORGANIZATION_ID variable")
          [ -n "$SIGNPATH_PROJECT_SLUG" ] || missing+=("SIGNPATH_PROJECT_SLUG variable")
          [ -n "$SIGNPATH_SIGNING_POLICY_SLUG" ] || missing+=("SIGNPATH_SIGNING_POLICY_SLUG variable")
          [ -n "$SIGNPATH_ARTIFACT_CONFIGURATION_SLUG" ] || missing+=("SIGNPATH_ARTIFACT_CONFIGURATION_SLUG variable")
          [ -n "$SIGNPATH_PUBLISHER_NAME" ] || missing+=("SIGNPATH_PUBLISHER_NAME variable")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error title=Missing SignPath configuration::%s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

      - name: Upload unsigned SpeechKit.exe
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES != 'true'
        id: upload-speechkit-exe
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unsigned-speechkit-exe
          path: dist/windows/SpeechKit/SpeechKit.exe
          compression-level: 0
          retention-days: 1

      - name: Sign SpeechKit.exe with SignPath
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES != 'true'
        uses: signpath/github-action-submit-signing-request@bc66d86b015a46e9c6d9700de73143a82f9570ff
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-speechkit-exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-speechkit-exe
          parameters: |
            version: "${{ needs.prepare.outputs.tag }}"
            commit: "${{ github.sha }}"

      - name: Replace signed SpeechKit.exe
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES != 'true'
        shell: pwsh
        run: |
          $signedExe = Get-ChildItem -Path "signed-speechkit-exe" -Recurse -Filter "SpeechKit.exe" | Select-Object -First 1
          if ($null -eq $signedExe) {
            throw 'Signed SpeechKit.exe not found in SignPath output.'
          }
          Copy-Item -Path $signedExe.FullName -Destination "dist/windows/SpeechKit/SpeechKit.exe" -Force

      - name: Upload unsigned SpeechKit-Setup.exe
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES != 'true' && needs.prepare.outputs.release_windows_installer == 'true'
        id: upload-speechkit-setup
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unsigned-speechkit-setup
          path: dist/windows/SpeechKit-Setup.exe
          compression-level: 0
          retention-days: 1

      - name: Sign SpeechKit-Setup.exe with SignPath
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES != 'true' && needs.prepare.outputs.release_windows_installer == 'true'
        uses: signpath/github-action-submit-signing-request@bc66d86b015a46e9c6d9700de73143a82f9570ff
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-speechkit-setup.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-speechkit-setup
          parameters: |
            version: "${{ needs.prepare.outputs.tag }}"
            commit: "${{ github.sha }}"

      - name: Replace signed SpeechKit-Setup.exe
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES != 'true' && needs.prepare.outputs.release_windows_installer == 'true'
        shell: pwsh
        run: |
          $signedInstaller = Get-ChildItem -Path "signed-speechkit-setup" -Recurse -Filter "SpeechKit-Setup.exe" | Select-Object -First 1
          if ($null -eq $signedInstaller) {
            throw 'Signed SpeechKit-Setup.exe not found in SignPath output.'
          }
          Copy-Item -Path $signedInstaller.FullName -Destination "dist/windows/SpeechKit-Setup.exe" -Force

      - name: Validate signed Windows binaries
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES != 'true'
        shell: pwsh
        run: |
          $validationArgs = @(
            '-DistDir', 'dist/windows',
            '-RequireTimestamp',
            '-ExpectedPublisher', '${{ vars.SIGNPATH_PUBLISHER_NAME }}'
          )
          if ('${{ needs.prepare.outputs.release_windows_installer }}' -eq 'true') {
            $validationArgs += '-RequireInstaller'
          }
          & ./scripts/validate-windows-signing.ps1 @validationArgs
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Mark unsigned public Windows release
        if: github.repository == 'kombifyio/SpeechKit' && vars.ALLOW_UNSIGNED_WINDOWS_RELEASES == 'true'
        shell: pwsh
        run: |
          @'
          WARNING: This Windows release is intentionally unsigned.

          This is a temporary transition release published before SignPath
          onboarding is complete. Windows SmartScreen and installation trust
          warnings are expected for this build.
          '@ | Set-Content -Path "UNSIGNED-WINDOWS-RELEASE.txt" -Encoding ascii

      - name: Install cyclonedx-gomod
        shell: pwsh
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      - name: Generate CycloneDX SBOM
        shell: pwsh
        # `app` produces a binary-rooted SBOM of the SpeechKit desktop host,
        # resolving only the modules actually linked into cmd/speechkit.
        run: |
          cyclonedx-gomod app -main cmd/speechkit -licenses -json -output SpeechKit.sbom.json .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $assets = @()
          if ('${{ needs.prepare.outputs.release_windows_installer }}' -eq 'true') {
            Copy-Item "dist/windows/SpeechKit-Setup.exe" "SpeechKit-Setup.exe"
            $assets += "SpeechKit-Setup.exe"
          }
          if ('${{ needs.prepare.outputs.release_windows_portable }}' -eq 'true') {
            Compress-Archive -Path "dist/windows/SpeechKit/*" -DestinationPath "SpeechKit-Portable.zip" -Force
            $assets += "SpeechKit-Portable.zip"
          }
          if (Test-Path "UNSIGNED-WINDOWS-RELEASE.txt") {
            $assets += "UNSIGNED-WINDOWS-RELEASE.txt"
          }
          if (Test-Path "SpeechKit.sbom.json") {
            $assets += "SpeechKit.sbom.json"
          }
          $checksums = foreach ($asset in $assets) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $asset).Hash.ToLowerInvariant()
            "$hash *$asset"
          }
          Set-Content -Path "SHA256SUMS.txt" -Value $checksums -Encoding ascii

          $subjectPaths = @($assets)
          $subjectPaths += 'SHA256SUMS.txt'

          "subject_paths<<EOF" >> $env:GITHUB_OUTPUT
          $subjectPaths | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

          "release_files<<EOF" >> $env:GITHUB_OUTPUT
          $subjectPaths | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Attest release artifacts
        if: vars.ENABLE_BUILD_ATTESTATIONS == 'true'
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: ${{ steps.assets.outputs.subject_paths }}

      - name: Upload Windows assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag }}"
          title="SpeechKit $tag"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $tag already exists; preserving publisher-managed notes."
            exit 0
          fi

          args=(release create "$tag" --repo "${{ github.repository }}" --title "$title" --notes-file release-notes.md --verify-tag)
          if [[ "$tag" == *-alpha* || "$tag" == *-beta* || "$tag" == *-rc* ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"

      - name: Attach Windows assets to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: SpeechKit ${{ needs.prepare.outputs.tag }}
          draft: true
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-alpha') || contains(needs.prepare.outputs.tag, '-beta') || contains(needs.prepare.outputs.tag, '-rc') }}
          files: ${{ steps.assets.outputs.release_files }}

  create-source-release:
    name: Create Source Release
    needs: prepare
    if: needs.prepare.outputs.should_build_windows != 'true'
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-24.04' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22

      - name: Render release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          node ./scripts/release/render-release-notes.mjs \
            --version "${{ needs.prepare.outputs.tag }}" \
            --repo-url "https://github.com/${{ github.repository }}" \
            --output release-notes.md

      - name: Create source release if the publisher has not already created it
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag }}"
          title="SpeechKit $tag"

          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $tag already exists; preserving publisher-managed notes."
            exit 0
          fi

          args=(release create "$tag" --repo "${{ github.repository }}" --title "$title" --notes-file release-notes.md --verify-tag)
          if [[ "$tag" == *-alpha* || "$tag" == *-beta* || "$tag" == *-rc* ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
