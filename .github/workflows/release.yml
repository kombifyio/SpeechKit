name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ${{ vars.WINDOWS_BUILD_RUNNER != '' && vars.WINDOWS_BUILD_RUNNER || 'windows-latest' }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version tag
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.tag }}' -ne '') {
            $tag = '${{ github.event.inputs.tag }}'
          } else {
            $tag = '${{ github.ref_name }}'
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "Release tag: $tag"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build canonical Windows bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build.ps1

      - name: Prepare release assets
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          Copy-Item "dist/windows/SpeechKit-Setup.exe" "SpeechKit-Setup-${tag}.exe"
          Compress-Archive -Path "dist/windows/SpeechKit/*" -DestinationPath "SpeechKit-Portable-${tag}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SpeechKit ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-alpha') || contains(steps.version.outputs.tag, '-beta') || contains(steps.version.outputs.tag, '-rc') }}
          generate_release_notes: true
          files: |
            SpeechKit-Setup-${{ steps.version.outputs.tag }}.exe
            SpeechKit-Portable-${{ steps.version.outputs.tag }}.zip
