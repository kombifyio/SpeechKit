name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ${{ vars.WINDOWS_BUILD_RUNNER || 'blacksmith-4vcpu-windows-2025' }}
    timeout-minutes: 40

    steps:
      - name: Resolve version tag
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.tag }}' -ne '') {
            $tag = '${{ github.event.inputs.tag }}'
            $checkoutRef = "refs/tags/$tag"
          } else {
            $tag = '${{ github.ref_name }}'
            $checkoutRef = '${{ github.ref }}'
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "checkout_ref=$checkoutRef" >> $env:GITHUB_OUTPUT
          echo "Release tag: $tag"
          echo "Checkout ref: $checkoutRef"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.version.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.25.8'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/app/package-lock.json

      - name: Setup MinGW
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build canonical Windows bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build.ps1

      - name: Prepare release assets
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          Copy-Item "dist/windows/SpeechKit-Setup.exe" "SpeechKit-Setup-${tag}.exe"
          Compress-Archive -Path "dist/windows/SpeechKit/*" -DestinationPath "SpeechKit-Portable-${tag}.zip"
          $assets = @(
            "SpeechKit-Setup-${tag}.exe",
            "SpeechKit-Portable-${tag}.zip"
          )
          $checksums = foreach ($asset in $assets) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $asset).Hash.ToLowerInvariant()
            "$hash *$asset"
          }
          Set-Content -Path "SHA256SUMS.txt" -Value $checksums -Encoding ascii

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: |
            SpeechKit-Setup-${{ steps.version.outputs.tag }}.exe
            SpeechKit-Portable-${{ steps.version.outputs.tag }}.zip
            SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SpeechKit ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-alpha') || contains(steps.version.outputs.tag, '-beta') || contains(steps.version.outputs.tag, '-rc') }}
          generate_release_notes: true
          files: |
            SpeechKit-Setup-${{ steps.version.outputs.tag }}.exe
            SpeechKit-Portable-${{ steps.version.outputs.tag }}.zip
            SHA256SUMS.txt
