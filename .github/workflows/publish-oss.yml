name: Publish OSS

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.14.0)'
        required: true
      release_windows_portable:
        description: 'Attach the portable Windows bundle (.zip) in kombifyio/SpeechKit'
        required: true
        default: true
        type: boolean
      release_windows_installer:
        description: 'Attach the NSIS Windows installer (.exe) in kombifyio/SpeechKit'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: publish-oss-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve Publish Plan
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-4vcpu-ubuntu-2204' }}
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      release_windows_portable: ${{ steps.plan.outputs.release_windows_portable }}
      release_windows_installer: ${{ steps.plan.outputs.release_windows_installer }}
      should_build_windows: ${{ steps.plan.outputs.should_build_windows }}

    steps:
      - name: Resolve publish plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
            checkout_ref="refs/tags/$tag"
            release_windows_portable="${{ github.event.inputs.release_windows_portable }}"
            release_windows_installer="${{ github.event.inputs.release_windows_installer }}"
          else
            tag="${{ github.ref_name }}"
            checkout_ref="${{ github.ref }}"
            release_windows_portable=true
            release_windows_installer=true
          fi

          should_build_windows=false
          if [ "$release_windows_portable" = true ] || [ "$release_windows_installer" = true ]; then
            should_build_windows=true
          fi

          {
            echo "tag=$tag"
            echo "checkout_ref=$checkout_ref"
            echo "release_windows_portable=$release_windows_portable"
            echo "release_windows_installer=$release_windows_installer"
            echo "should_build_windows=$should_build_windows"
          } >> "$GITHUB_OUTPUT"

  publish-source:
    name: Export & Push to kombifyio/SpeechKit
    needs: prepare
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-4vcpu-ubuntu-2204' }}
    timeout-minutes: 20
    env:
      OSS_REPO_OWNER: kombifyio
      OSS_REPO_NAME: SpeechKit
      OSS_REPO: kombifyio/SpeechKit
      OSS_PUBLISH_TOKEN: ${{ secrets.OSS_PUBLISH_TOKEN }}
    outputs:
      tag: ${{ needs.prepare.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.25.9'
          cache: false

      - name: Make export scripts executable
        run: chmod +x scripts/public/*.sh

      - name: Run public export
        run: bash scripts/public/export-public.sh "${{ runner.temp }}/oss-export"

      - name: Resolve release auth
        id: release-auth
        shell: bash
        run: |
          set -euo pipefail
          release_token="$(printf '%s' "$OSS_PUBLISH_TOKEN" | tr -d '\r\n')"
          if [ -z "$release_token" ]; then
            echo "::error title=Missing release credentials::Configure OSS_PUBLISH_TOKEN for this repository."
            exit 1
          fi
          echo "::add-mask::$release_token"
          echo "token=$release_token" >> "$GITHUB_OUTPUT"

      - name: Clone kombifyio/SpeechKit
        shell: bash
        env:
          RELEASE_AUTH_TOKEN: ${{ steps.release-auth.outputs.token }}
        run: |
          set -euo pipefail
          rm -rf oss-repo
          git clone "https://x-access-token:${RELEASE_AUTH_TOKEN}@github.com/${OSS_REPO}.git" oss-repo

      - name: Sync export into OSS repo
        run: |
          cd oss-repo
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "${{ runner.temp }}/oss-export"/. .

      - name: Commit and push
        env:
          RELEASE_AUTH_TOKEN: ${{ steps.release-auth.outputs.token }}
        run: |
          set -euo pipefail
          cd oss-repo
          tag="${{ needs.prepare.outputs.tag }}"
          git remote set-url origin "https://x-access-token:${RELEASE_AUTH_TOKEN}@github.com/${OSS_REPO}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No OSS content changes to commit."
          else
            git commit -m "release: $tag"
            git push origin HEAD:main
          fi
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "OSS tag $tag already exists on origin."
          else
            git tag "$tag"
            git push origin "refs/tags/$tag"
          fi

  create-release:
    name: Create OSS Source Release
    needs: publish-source
    runs-on: ${{ vars.CI_RUNNER || 'blacksmith-4vcpu-ubuntu-2204' }}
    env:
      OSS_REPO_OWNER: kombifyio
      OSS_REPO_NAME: SpeechKit
      OSS_REPO: kombifyio/SpeechKit
      OSS_PUBLISH_TOKEN: ${{ secrets.OSS_PUBLISH_TOKEN }}

    steps:
      - name: Resolve release auth
        id: release-auth
        shell: bash
        run: |
          set -euo pipefail
          release_token="$(printf '%s' "$OSS_PUBLISH_TOKEN" | tr -d '\r\n')"
          if [ -z "$release_token" ]; then
            echo "::error title=Missing release credentials::Configure OSS_PUBLISH_TOKEN for this repository."
            exit 1
          fi
          echo "::add-mask::$release_token"
          echo "token=$release_token" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release in kombifyio/SpeechKit
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          repository: ${{ env.OSS_REPO }}
          token: ${{ steps.release-auth.outputs.token }}
          tag_name: ${{ needs.publish-source.outputs.tag }}
          name: SpeechKit ${{ needs.publish-source.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.publish-source.outputs.tag, '-alpha') || contains(needs.publish-source.outputs.tag, '-beta') || contains(needs.publish-source.outputs.tag, '-rc') }}
          generate_release_notes: true

  build-and-release:
    name: Build OSS Binaries & Release
    needs:
      - prepare
      - publish-source
      - create-release
    if: needs.prepare.outputs.should_build_windows == 'true'
    runs-on: ${{ vars.WINDOWS_BUILD_RUNNER || 'blacksmith-4vcpu-windows-2025' }}
    timeout-minutes: 60
    env:
      OSS_REPO_OWNER: kombifyio
      OSS_REPO_NAME: SpeechKit
      OSS_REPO: kombifyio/SpeechKit
      OSS_PUBLISH_TOKEN: ${{ secrets.OSS_PUBLISH_TOKEN }}

    steps:
      - name: Resolve release auth
        id: release-auth
        shell: bash
        run: |
          set -euo pipefail
          release_token="$(printf '%s' "$OSS_PUBLISH_TOKEN" | tr -d '\r\n')"
          if [ -z "$release_token" ]; then
            echo "::error title=Missing release credentials::Configure OSS_PUBLISH_TOKEN for this repository."
            exit 1
          fi
          echo "::add-mask::$release_token"
          echo "token=$release_token" >> "$GITHUB_OUTPUT"

      - name: Checkout kombifyio/SpeechKit tag
        shell: bash
        env:
          RELEASE_AUTH_TOKEN: ${{ steps.release-auth.outputs.token }}
        run: |
          set -euo pipefail
          rm -rf oss-repo
          git clone "https://x-access-token:${RELEASE_AUTH_TOKEN}@github.com/${OSS_REPO}.git" oss-repo
          cd oss-repo
          git fetch --tags origin
          git checkout "refs/tags/${{ needs.publish-source.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.25.9'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: oss-repo/frontend/app/package-lock.json

      - name: Setup MinGW
        uses: msys2/setup-msys2@cafece8e6baf9247cf9b1bf95097b0b983cc558d
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install NSIS
        if: needs.prepare.outputs.release_windows_installer == 'true'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build canonical Windows bundle from OSS tag
        shell: pwsh
        working-directory: oss-repo
        run: |
          if ('${{ needs.prepare.outputs.release_windows_installer }}' -eq 'true') {
            ./scripts/build.ps1
          } else {
            ./scripts/build.ps1 -SkipInstaller
          }

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $tag = '${{ needs.publish-source.outputs.tag }}'
          $assets = @()
          if ('${{ needs.prepare.outputs.release_windows_installer }}' -eq 'true') {
            Copy-Item "oss-repo/dist/windows/SpeechKit-Setup.exe" "SpeechKit-Setup-${tag}.exe"
            $assets += "SpeechKit-Setup-${tag}.exe"
          }
          if ('${{ needs.prepare.outputs.release_windows_portable }}' -eq 'true') {
            Compress-Archive -Path "oss-repo/dist/windows/SpeechKit/*" -DestinationPath "SpeechKit-Portable-${tag}.zip" -Force
            $assets += "SpeechKit-Portable-${tag}.zip"
          }
          $checksums = foreach ($asset in $assets) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $asset).Hash.ToLowerInvariant()
            "$hash *$asset"
          }
          Set-Content -Path "SHA256SUMS.txt" -Value $checksums -Encoding ascii

          $subjectPaths = @($assets)
          $subjectPaths += 'SHA256SUMS.txt'

          "subject_paths<<EOF" >> $env:GITHUB_OUTPUT
          $subjectPaths | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

          "release_files<<EOF" >> $env:GITHUB_OUTPUT
          $subjectPaths | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Attest OSS release artifacts
        if: vars.ENABLE_BUILD_ATTESTATIONS == 'true'
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: ${{ steps.assets.outputs.subject_paths }}

      - name: Upload OSS Windows assets to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          repository: ${{ env.OSS_REPO }}
          token: ${{ steps.release-auth.outputs.token }}
          tag_name: ${{ needs.publish-source.outputs.tag }}
          name: SpeechKit ${{ needs.publish-source.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.publish-source.outputs.tag, '-alpha') || contains(needs.publish-source.outputs.tag, '-beta') || contains(needs.publish-source.outputs.tag, '-rc') }}
          generate_release_notes: true
          files: ${{ steps.assets.outputs.release_files }}
